# This block is required for Nginx to start
events {
    worker_connections 1024;
}

http {
    # It's better to include mime.types here so it applies to the whole server
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        # TLS Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Root directory (Matches your auto_config.sh install path)
        root /var/www/html/wordpress;
        index index.php;

        # Main location block
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # PHP-FPM Proxying
        location ~ \.php$ {
            # Check if file exists to prevent processing non-existent scripts
            try_files $uri =404;
            
            fastcgi_split_path_info ^(.+\.php)(/.+)$; 

            # Standard FastCGI parameters
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # The service name 'wordpress' must match your docker-compose.yml
            fastcgi_pass wordpress:9000;
            fastcgi_param HTTPS on;
        }

        gzip on;
    }
}
